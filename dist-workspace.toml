[workspace]
members = ["cargo:."]

[dist]
cargo-dist-version = "0.30.2"
ci = "github"
installers = ["shell", "powershell", "homebrew"]
tap = "delianides/homebrew-git-rt"
targets = [
  "x86_64-apple-darwin",
  "aarch64-apple-darwin",
  "x86_64-unknown-linux-musl",
  "aarch64-unknown-linux-musl",
]
install-updater = false
allow-dirty = ["ci"]
